<!DOCTYPE html><html><head>
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name=viewport>
    <meta charset=utf-8>
    <link rel="stylesheet" href="./init.css">
    <style>
    .REPLY_LI{
    border-top: none;
    margin-top: 0px;
    padding-top: 0px;
    }
    .LI a{
    text-decoration: none;
    /* color:#000; */
    }
    .LI a:hover{
    color:#f40;
    }
    #LATEST {
    font-family: Rajdhani,PingFang SC;
    font-weight: 200;
    font-size: 32px;
    margin: 28px 0 20px;
    }
    #search_btn {
        font-family: Arial;
        text-decoration: none;
        font-size: 13px;
        color: #FFF;
        background: #24a2e0b9;
        padding: 1px 5px;
        border: 1px solid #24a2e0b9;
    }
    #rss_btn {
        font-family: Arial;
        text-decoration: none;
        font-size: 13px;
        color: #FFF;
        background: #f2853d;
        padding: 1px 5px;
        border: 1px solid #ed6b2a;
    }
    </style>
    <title>最新回复</title>
    </head>
    <body><div class="BODY">
    <div class="BACK"><a href="../index.html">返回索引页</a></div>
    <div id="LATEST">最新回复
        <span><a href="../rss.xml" id="rss_btn">RSS</a></span>
        <span><a href="../search" id="search_btn">搜索</a></span>
    </div>
    <p class="DATE">${date}</p>
    <div class="REPLY_LI">
    <div class="REPLY_LI">
    %for art_id, comment, reply, nickname, comment_date, reply_date, comment_md5, comment_tag, deleted in comment_data:
    <div class="LI">
    <div class="USER"><span class="NAME" id=${comment_md5}><a href="./${art_id}.html#${comment_md5}">${nickname}</a></span>
    <div class="TIME">${comment_date}</div></div>
    <div class="SAY">${comment}</div>
    %if reply:
    <div class="REPLY">${reply}</div>
    %endif
    </div>
    %endfor
    </div>
    </div>
    <div class="BACK"><a href="../index.html">返回索引页</a></div>
    </body></html>
