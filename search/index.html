<html lang="zh-cn">

<head>
    <link rel="stylesheet" href="init.css">
    <script src='jquery.min.js'></script>
    <script src='search.js'></script>
    <script src="../html/supabase.js"></script>
    <script  src="../html/tag.js"></script>
    <link rel="stylesheet" href="../html/fSelect.css">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name=viewport>
    <meta charset=utf-8>
    <title>博客搜索</title>
</head>

<body>
    <div class=BODY>
        <div class="BACK"><a href="../index.html">返回索引页</a></div>
        <h1>博客搜索</h1>
        </p>
        <div class="category">
            <label for="正文" id="正文-label"></label>
            <input type="checkbox" id="正文" onclick="switchCat(this.id)">
            <label for="后注" id="后注-label"></label>
            <input type="checkbox" id="后注" onclick="switchCat(this.id)">
            <label for="访谈" id="访谈-label"></label>
            <input type="checkbox" id="访谈" onclick="switchCat(this.id)">
            <label for="问答" id="问答-label"></label>
            <input type="checkbox" id="问答" onclick="switchCat(this.id)">
        </div>
        <div clas="search" id="search">
            <br>
            <span>起始日期：</span>
                <input style="width:100px" type="date" id="startDate" value="2014-07-21" min="2014-07-21" onchange="updateDate();">
                <br>
            <span>结束日期：</span>
                <input style="width:100px" type="date" id="endDate" value="2027-01-01" min="2014-07-21" onchange="updateDate();">
            <div class="input">
                <input type="text" onkeydown="enter_search(event)" id="search-input">
                <button type="button" onclick="search()">搜索</button>
                <label onclick="searchURL()" id="offline-label">离线搜索</label>
            </div>

            <div id="search-result">
                <div class="post_count"></div>
                <div class="annotation_count"></div>
                <div class="transcript_count"></div>
                <div class="comment_count"></div>
                <br><br>
                <div class="POST_LI" id="post_li">
                    <p>使用须知：</p>
                    <p>1. 可搜索项目：文章（正文和后注）和访谈的标题、正文；评论、回复和读者昵称；</p>
                    <p>2. 支持正则表达式搜索，比如利用关键词 <b>[^a-z]AI[^a-z]</b> 来搜索所有有关AI的条目；</p>
                    <p>3. 离线搜索，需要在本地托管<a href="https://github.com/taizihuang/wmyblog/archive/refs/heads/main.zip">网页</a>，然后点击“离线搜索”按钮。</p>
                </div>
                <div class="ANNOTATION_LI" id="annotation_li"></div>
                <div class="TRANSCRIPT_LI" id="transcript_li"></div>
                <div class="REPLY_LI" id="reply_li"></div>
            </div>
        </div>
    </div>
</body>



</html>
